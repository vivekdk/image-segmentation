data:
  dataset_name: oxford_pet
  root_dir: data
  image_size: 256
  batch_size: 8
  num_workers: 0
  val_fraction: 0.15
  seed: 42
  download: true

model:
  in_channels: 3
  out_channels: 1
  base_channels: 32

optimizer:
  lr: 0.001
  weight_decay: 0.0001
  epochs: 25

training:
  device: auto
  threshold: 0.5
  early_stopping_patience: 5
  log_every_n_steps: 10
  output_root: outputs
  run_name: oxford_pet_unet
  save_visualizations: true
  num_visualization_samples: 4
